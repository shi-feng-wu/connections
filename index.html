<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Connections</title>
    <link rel="icon" type="image/png" href="/connections-icon.png" />
    <!-- Self-hosted fonts (see src/index.css). Google Fonts is blocked inside the
         Discord Activity sandbox, so the @font-face src points at our own origin;
         preload to cut the score/wordmark serif's flash-of-fallback. -->
    <link rel="preload" href="/fonts/newsreader.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/libre-franklin.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body class="bg-black text-zinc-100 antialiased">
    <!-- min-h-dvh tracks the Discord iframe height. Vertical centering is done with
         auto margins on the child (via [&>*]:my-auto), NOT justify-center: when the
         content is taller than the viewport (the end screen), justify-center pushes
         the top off-screen with no way to scroll to it — clipping the score hero.
         Auto margins collapse to a top anchor on overflow, so the top stays reachable.
         Mobile/tablet top padding is exactly --sait — the Discord top-bar + notch
         clearance (index.css) — and no more: just enough that the native bar never
         overlaps the board, which on short viewports hands the freed space to the tiles
         instead of squishing them. Desktop zeroes BOTH vertical paddings: the wide layout
         has no overlay bar (--sait≈0) and its margin is owned entirely by GameView's
         scale-to-fit, whose vertical gutter shrinks as the window shortens — so the board
         spends scarce height on itself, not on padding. (A fixed pt/pb here would fight
         that: it can't shrink, so it'd strand padding on short windows or force overflow.)
         The 800px switch matches DESKTOP_BP / the min-[800px]: classes in components.tsx —
         the wide layout's one breakpoint. Bottom padding grows to the home-indicator safe
         area when the webview extends under it (viewport-fit=cover above); GameView's
         mobile min-h calc mirrors both paddings — keep them in sync. -->
    <div id="app" class="mx-auto flex min-h-dvh w-full max-w-[940px] flex-col px-4 pb-[max(1.5rem,var(--saib))] pt-[var(--sait)] min-[800px]:pt-0 min-[800px]:pb-0 [&>*]:my-auto"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
