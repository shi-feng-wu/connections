<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Connections</title>
    <!-- Self-hosted fonts (see src/index.css). Google Fonts is blocked inside the
         Discord Activity sandbox, so the @font-face src points at our own origin;
         preload to cut the score/wordmark serif's flash-of-fallback. -->
    <link rel="preload" href="/fonts/newsreader.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/libre-franklin.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body class="bg-black text-zinc-100 antialiased">
    <!-- min-h-dvh tracks the Discord iframe height. Vertical centering is done with
         auto margins on the child (via [&>*]:my-auto), NOT justify-center: when the
         content is taller than the viewport (the end screen), justify-center pushes
         the top off-screen with no way to scroll to it — clipping the score hero.
         Auto margins collapse to a top anchor on overflow, so the top stays reachable.
         pt-8 leaves headroom for the score hero, which rides up out of the title row —
         a mobile-only concern (desktop's score lives in the footer, not above a title),
         so the desktop view drops the top padding and the header hugs the top. The
         900px switch matches DESKTOP_BP / the min-[900px]: classes in components.tsx —
         the wide layout's one breakpoint. Bottom padding grows to the home-indicator
         safe area when the webview extends under it (viewport-fit=cover above);
         GameView's mobile min-h calc mirrors both paddings — keep them in sync. -->
    <div id="app" class="mx-auto flex min-h-dvh w-full max-w-[940px] flex-col px-4 pb-[max(1.5rem,env(safe-area-inset-bottom))] pt-8 min-[900px]:pt-0 [&>*]:my-auto"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
