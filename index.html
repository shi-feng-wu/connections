<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Connections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Libre+Franklin:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-black text-zinc-100 antialiased">
    <!-- min-h-dvh tracks the Discord iframe height. Vertical centering is done with
         auto margins on the child (via [&>*]:my-auto), NOT justify-center: when the
         content is taller than the viewport (the end screen), justify-center pushes
         the top off-screen with no way to scroll to it — clipping the score hero.
         Auto margins collapse to a top anchor on overflow, so the top stays reachable.
         pt-8 leaves headroom for the score hero, which rides up out of the title row. -->
    <div id="app" class="mx-auto flex min-h-dvh w-full max-w-[940px] flex-col px-4 pb-6 pt-8 [&>*]:my-auto"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
